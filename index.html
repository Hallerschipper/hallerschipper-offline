<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hallerschipper</title>
  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <header class="header">
    <img src="logo.png" alt="Hallerschipper Logo" class="logo">
    <div>
      <h1>Hallerschipper</h1>
      <p class="subtitle">Alle Lieder aus der ZIP-Datei</p>
    </div>
  </header>

  <main class="wrap">
    <section id="listView" class="card">
      <input type="text" id="search" placeholder="Lied, Nummer oder Text suchen..." aria-label="Suche">
      <div class="filters">
        <select id="categoryFilter" aria-label="Kategorie wählen">
          <option value="Alle">Alle Kategorien</option>
        </select>
      </div>
      <div class="meta">
        <span id="count"></span>
      </div>
      <ul id="songList" class="song-list"></ul>
    </section>

    <section id="detailView" class="card hidden">
      <button id="backBtn" class="back-btn">← Zurück zur Liste</button>
      <div id="songCategory" class="badge"></div>
      <h2 id="songTitle"></h2>
      <pre id="songText" class="lyrics"></pre>
    </section>
  </main>

  <script src="songs.js"></script>
  <script src="app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>

</body>
</html>
